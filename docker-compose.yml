version: "3.9"

services:
  ufc-bot:
    build: .
    container_name: ufc_telegram_bot
    restart: unless-stopped
    expose:
      - "${PORT:-8765}"
    environment:
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN}
      - WEBHOOK_URL=${WEBHOOK_URL}
      - SECRET_TOKEN=${SECRET_TOKEN}
      - PORT=${PORT:-8765}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ufc-bot.rule=Host(`api.ufc.minutarecore.space`)"
      - "traefik.http.routers.ufc-bot.entrypoints=websecure"
      - "traefik.http.routers.ufc-bot.tls=true"
      - "traefik.http.routers.ufc-bot.tls.certresolver=letsencrypt"
      - "traefik.http.services.ufc-bot.loadbalancer.server.port=${PORT:-8765}"
    networks:
      - dokploy-network

networks:
  dokploy-network:
    external: true
